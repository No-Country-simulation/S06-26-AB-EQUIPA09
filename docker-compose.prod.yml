services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sqlens

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      APP_URL: ${APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      SIGNED_URL_SECRET: ${SIGNED_URL_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SSL: ${DB_SSL:-false}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      STAFF_SEED_EMAIL: ${STAFF_SEED_EMAIL:-admin@sqlens.ao}
      STAFF_SEED_NAME: ${STAFF_SEED_NAME:-Admin SQLens}
      STAFF_SEED_PASSWORD: ${STAFF_SEED_PASSWORD}
      TRUSTED_PROXY: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: "false"
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sqlens

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
        VITE_USE_MOCK: "false"
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sqlens

volumes:
  postgres_data:

networks:
  sqlens:
    driver: bridge
